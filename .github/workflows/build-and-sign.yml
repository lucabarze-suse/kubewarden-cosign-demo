name: Build, Sign, and Attest Image

on:
  push:
    branches: [ "main", "dev" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write # Necessario per la firma keyless con Sigstore

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
      image_name: ghcr.io/${{ github.repository }}
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=v1.0-${{ github.ref_name }}

      - name: Build and push container image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  attest:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    permissions:
      actions: read   # Per leggere il workflow per SLSA
      id-token: write # Per firmare con Sigstore
      packages: write # Per scrivere le attestazioni nel registry
      contents: write # Per caricare la provenienza come release asset (opzionale)

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate SBOM
        id: sbom
        uses: anchore/sbom-action@v0
        with:
          image: "${{ needs.build-and-push.outputs.image_name }}@${{ needs.build-and-push.outputs.image_digest }}"
          format: "spdx-json"
          output-file: "sbom.spdx.json" # Specifica il nome del file di output

      - name: Generate SLSA Provenance
        id: slsa
        uses: slsa-project/slsa-github-generator@v2.0.0
        # Non servono 'with' parameters! 
        # L'action rileva automaticamente l'immagine dal job precedente.

      - name: Sign the image with Cosign (Keyless)
        run: |
          cosign sign --yes --keyless -a "branch=${{ github.ref_name }}" \
            "${{ needs.build-and-push.outputs.image_name }}@${{ needs.build-and-push.outputs.image_digest }}"

      - name: Attest the SBOM with Cosign
        run: |
          cosign attest --yes --keyless --predicate sbom.spdx.json --type spdxjson \
            "${{ needs.build-and-push.outputs.image_name }}@${{ needs.build-and-push.outputs.image_digest }}"
      
      - name: Attest the SLSA Provenance with Cosign
        run: |
          cosign attest --yes --keyless --predicate ${{ steps.slsa.outputs.provenance-path }} --type slsa \
            "${{ needs.build-and-push.outputs.image_name }}@${{ needs.build-and-push.outputs.image_digest }}"

