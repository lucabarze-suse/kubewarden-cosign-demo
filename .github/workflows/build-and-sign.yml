name: Build, Sign, and Attest Image

on:
  push:
    branches: [ "main", "dev" ]
  workflow_dispatch:

permissions: read # Permessi di base a livello di workflow

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
      image_name: ghcr.io/${{ github.repository }}
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=v1.0-${{ github.ref_name }}

      - name: Build and push container image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Job dedicato a chiamare il reusable workflow di SLSA
  generate-provenance:
    needs: [build-and-push]
    permissions:
      actions: read       # Per leggere il workflow
      id-token: write     # Per la firma OIDC di SLSA
      contents: write     # Per caricare la provenienza come release asset
    uses: slsa-project/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      # Nome dell'immagine senza tag/digest
      image-repository: ${{ needs.build-and-push.outputs.image_name }}
      # Digest dell'immagine buildata nel job precedente
      image-digest: ${{ needs.build-and-push.outputs.image_digest }}
      # Nome dell'artefatto di provenienza che verrà creato
      provenance-name: ${{ needs.build-and-push.outputs.image_tag }}.provenance

  # Job finale per firmare e attestare l'SBOM
  sign-and-attest:
    needs: [build-and-push, generate-provenance]
    runs-on: ubuntu-latest
    permissions:
      packages: write # Per scrivere firma e attestazioni nel registry
      id-token: write # Per firmare con Cosign
      contents: read

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: "${{ needs.build-and-push.outputs.image_name }}@${{ needs.build-and-push.outputs.image_digest }}"
          format: "spdx-json"
          output-file: "sbom.spdx.json"

      - name: Sign the image with Cosign (Keyless)
        run: |
          cosign sign --yes --keyless -a "branch=${{ github.ref_name }}" \
            "${{ needs.build-and-push.outputs.image_name }}@${{ needs.build-and-push.outputs.image_digest }}"

      - name: Attest the SBOM with Cosign
        run: |
          cosign attest --yes --keyless --predicate sbom.spdx.json --type spdxjson \
            "${{ needs.build-and-push.outputs.image_name }}@${{ needs.build-and-push.outputs.image_digest }}"

