name: Build, Sign, and Attest Image

on:
  push:
    branches: ["main", "dev"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
      image_name: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=v1.0-${{ github.ref_name }}

      - name: Build and push container image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  sign-and-attest:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate SBOM with Trivy
        uses: aquasecurity/trivy-action@v0
        with:
          image-ref: "${{ needs.build-and-push.outputs.image_name }}@${{ needs.build-and-push.outputs.image_digest }}"
          format: 'spdx-json'
          output: 'sbom.spdx.json'
          scanners: 'sbom'
          sbom-sources: 'os,pip'

      - name: Sign the image with Cosign
        run: |
          cosign sign --yes -a "branch=${{ github.ref_name }}" \
            "${{ needs.build-and-push.outputs.image_name }}@${{ needs.build-and-push.outputs.image_digest }}"

      - name: Attest the SBOM with Cosign
        run: |
          set -e
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson \
            "${{ needs.build-and-push.outputs.image_name }}@${{ needs.build-and-push.outputs.image_digest }}"
      
      - name: Generate SLSA Provenance Attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ needs.build-and-push.outputs.image_name }}
          subject-digest: ${{ needs.build-and-push.outputs.image_digest }}
          push-to-registry: true
