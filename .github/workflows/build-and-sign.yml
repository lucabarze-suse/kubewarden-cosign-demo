name: Build, Sign, and Attest Image

on:
  push:
    branches: [ "main", "dev" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
      image_name: ghcr.io/${{ github.repository }}
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=v1.0-${{ github.ref_name }}

      - name: Build and push container image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_BRANCH=${{ github.ref_name }}
            APP_VERSION=${{ steps.meta.outputs.version }}

  sign-and-attest:
    needs: [build-and-push]
    runs-on: ubuntu-latest

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft
        uses: anchore/syft-action@v0
        with:
          image: ${{ needs.build-and-push.outputs.image_name }}@${{ needs.build-and-push.outputs.image_digest }}
          format: spdx-json
          output: sbom.spdx.json

      - name: Sign the image with Cosign (Keyless)
        run: |
          cosign sign --keyless -a "branch=${{ github.ref_name }}" \
            "${{ needs.build-and-push.outputs.image_name }}@${{ needs.build-and-push.outputs.image_digest }}"

      - name: Attest the SBOM with Cosign
        run: |
          cosign attest --keyless --predicate sbom.spdx.json --type spdxjson \
            "${{ needs.build-and-push.outputs.image_name }}@${{ needs.build-and-push.outputs.image_digest }}"

  generate-slsa:
    needs: [build-and-push]
    permissions:
      id-token: write
      contents: write
      actions: read
      
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v1.9.0
    with:
      base64-subjects: "${{ needs.build-and-push.outputs.image_digest }}"
      provenance-name: "pod-info-py.provenance"
